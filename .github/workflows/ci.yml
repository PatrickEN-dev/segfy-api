name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel superseded runs on the same ref. Saves GHA minutes and stops the
# queue from piling up when someone pushes twice in a row.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Cache NuGet packages keyed by csproj hashes. Cold restore (~30-60s)
      # drops to a few seconds on cache hit.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Segfy.sln

      - name: Build (warnings as errors)
        run: dotnet build Segfy.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Segfy.sln --configuration Release --no-build --no-restore --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'

  docker-build:
    name: Docker image build
    # Runs in parallel with build-and-test. The two checks are independent:
    # tests exercise the code, this validates the Dockerfile still builds.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: segfy-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
