# Render Blueprint - https://render.com/docs/blueprint-spec
#
# Como usar:
#   1. Fork/clone deste repo no GitHub.
#   2. Render Dashboard -> New + -> Blueprint -> aponta pro repo -> Apply.
#   3. Render le este arquivo, builda o Dockerfile, sobe a API.
#   4. ~3 min depois: https://segfy-api.onrender.com/docs
#
# Free tier:
#   - Servico dorme apos 15 min ociosos (primeira request pos-sleep ~30s).
#   - Sem disco persistente. SQLite fica na rootFS e e reprovisionado a cada
#     deploy. Segfy__SeedSampleData=true popula 6 apolices de exemplo no boot.
#   - Para dados persistentes: plano Starter + descomentar o bloco `disk`.

services:
  - type: web
    name: segfy-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ConnectionStrings__Default
        value: Data Source=/app/data/segfy.db;Cache=Shared
      - key: Segfy__ExpiringWindowDays
        value: "30"
      - key: Segfy__AutoExpirationEnabled
        value: "true"
      - key: Segfy__AutoExpirationIntervalSeconds
        value: "3600"
      - key: Segfy__SeedSampleData
        value: "true"

    # Descomente no plano Starter+ para persistir o SQLite entre deploys:
    # disk:
    #   name: segfy-data
    #   mountPath: /app/data
    #   sizeGB: 1
